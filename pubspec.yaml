name: petapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.16+16

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  get: ^4.7.2
  get_storage: ^2.1.1
  intl: ^0.20.2
  flutter_svg: ^2.2.2
  flutter_dotenv: ^6.0.0
  dio: ^5.9.0
  connectivity_plus: ^7.0.0
  logger: ^2.6.2
  flutter_native_splash: ^2.4.7
  carousel_slider: ^5.1.1
  carousel_slider_plus: ^7.1.1
  flutter_network_image: ^0.1.0
  cached_network_image: ^3.4.1
  country_code_picker: ^3.4.1
  pinput: ^5.0.2
  lottie: ^3.3.2
  image_picker: ^1.2.1
  remixicon: ^1.4.1
  dotted_line: ^3.2.3
  device_preview: ^1.3.1
  uuid: ^4.5.2
  easy_stepper: ^0.9.1
  modal_bottom_sheet: ^3.0.0
  flutter_advanced_drawer: ^1.5.0
  google_maps_flutter: ^2.14.0
  location: ^8.0.1
  stepper_a: ^1.0.1

  file_picker: ^10.3.7
  loader_overlay: ^4.0.2+1
  flutter_spinkit: ^5.2.1
  adyen_checkout: ^1.7.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  flutter_inappwebview: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/launcher_logo_1.png"
  adaptive_icon_foreground: "assets/images/launcher_logo_1.png"
  adaptive_icon_background: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/envs/
  fonts:
    - family: NationalPark
      fonts:
        - asset: assets/fonts/NationalPark-Light.ttf
          weight: 300
        - asset: assets/fonts/NationalPark-Regular.ttf
          weight: 400
        - asset: assets/fonts/NationalPark-Medium.ttf
          weight: 500
        - asset: assets/fonts/NationalPark-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NationalPark-Bold.ttf
          weight: 700
        - asset: assets/fonts/NationalPark-ExtraBold.ttf
          weight: 800
